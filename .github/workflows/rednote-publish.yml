name: Publish rednote

on:
  push:
    branches:
      - main
    paths:
      - "packages/rednote/**"
      - ".github/workflows/rednote-publish.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-rednote

jobs:
  publish:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/rednote

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: packages/rednote/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compute next version
        id: version
        run: |
          CURRENT_VERSION=$(npm view @skills-store/rednote version 2>/dev/null || node -p "require('./package.json').version")
          NEXT_VERSION=$(node -e "const [major, minor, patch] = process.argv[1].split('.').map(Number); console.log([major, minor, patch + 1].join('.'));" "$CURRENT_VERSION")
          npm version "$NEXT_VERSION" --no-git-tag-version
          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): publish rednote v${{ steps.version.outputs.next }} [skip ci]"
          git push origin HEAD:main
