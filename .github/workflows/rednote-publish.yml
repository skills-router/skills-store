name: Publish rednote

on:
  push:
    branches:
      - main
    paths:
      - "packages/rednote-cli/**"
      - ".github/workflows/rednote-publish.yml"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-rednote

jobs:
  publish:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/rednote-cli

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: packages/rednote-cli/package-lock.json

      - name: Upgrade npm for trusted publishing
        run: |
          set -euo pipefail
          npm install -g npm@latest
          npm --version
          node --version

      - name: Install dependencies
        run: npm ci

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail
          PUBLISHED_VERSION=$(npm view @skills-store/rednote version 2>/dev/null || echo "0.0.0")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          BASE_VERSION=$(node -e "const parse = (v) => v.split('.').map(Number); const compare = (left, right) => { for (let index = 0; index < 3; index += 1) { if (left[index] !== right[index]) return left[index] - right[index]; } return 0; }; const published = parse(process.argv[1]); const local = parse(process.argv[2]); console.log(compare(published, local) > 0 ? process.argv[1] : process.argv[2]);" "$PUBLISHED_VERSION" "$LOCAL_VERSION")
          NEXT_VERSION=$(node -e "const [major, minor, patch] = process.argv[1].split('.').map(Number); console.log([major, minor, patch + 1].join('.'));" "$BASE_VERSION")
          npm version "$NEXT_VERSION" --no-git-tag-version
          echo "published=$PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"
          echo "local=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          echo "base=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify package tarball
        run: |
          set -euo pipefail
          npm pack --json > pack.json
          node <<'NODE'
          const fs = require('node:fs');

          const [pack] = JSON.parse(fs.readFileSync('pack.json', 'utf8'));
          const files = new Set((pack.files ?? []).map((entry) => entry.path));
          const requiredFiles = [
            'bin/rednote.js',
            'dist/index.js',
            'dist/rednote/index.js',
            'package.json',
            'README.md',
          ];
          const missingFiles = requiredFiles.filter((file) => !files.has(file));

          if (missingFiles.length > 0) {
            console.error(`Missing required files in npm tarball: ${missingFiles.join(', ')}`);
            process.exit(1);
          }

          console.log(`Verified npm tarball for ${pack.name}@${pack.version}`);
          console.log(`Required files present: ${requiredFiles.join(', ')}`);
          NODE

      - name: Commit version bump
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --cached --quiet && exit 0
          git commit -m "chore(release): publish rednote v${{ steps.version.outputs.next }} [skip ci]"

      - name: Publish to npm
        run: |
          set -euo pipefail
          npm publish --access public

      - name: Push version bump
        run: |
          set -euo pipefail
          git push origin HEAD:main
