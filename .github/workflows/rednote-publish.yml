name: Publish rednote

on:
  push:
    branches:
      - main
    paths:
      - "packages/rednote/**"
      - ".github/workflows/rednote-publish.yml"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-rednote

jobs:
  publish:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/rednote

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: packages/rednote/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compute next version
        id: version
        run: |
          PUBLISHED_VERSION=$(npm view @skills-store/rednote version 2>/dev/null || echo "0.0.0")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          BASE_VERSION=$(node -e "const parse = (v) => v.split('.').map(Number); const compare = (left, right) => { for (let index = 0; index < 3; index += 1) { if (left[index] !== right[index]) return left[index] - right[index]; } return 0; }; const published = parse(process.argv[1]); const local = parse(process.argv[2]); console.log(compare(published, local) > 0 ? process.argv[1] : process.argv[2]);" "$PUBLISHED_VERSION" "$LOCAL_VERSION")
          NEXT_VERSION=$(node -e "const [major, minor, patch] = process.argv[1].split('.').map(Number); console.log([major, minor, patch + 1].join('.'));" "$BASE_VERSION")
          npm version "$NEXT_VERSION" --no-git-tag-version
          echo "published=$PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"
          echo "local=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          echo "base=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: npm publish --access public

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): publish rednote v${{ steps.version.outputs.next }} [skip ci]"
          git push origin HEAD:main
